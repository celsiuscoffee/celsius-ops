name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  # Typecheck every app. Per-user memory: "Always typecheck before
  # pushing." This enforces it in CI so the rule survives a forgotten
  # local run. Runs in parallel via matrix; fails the PR if any app
  # has a TS error.
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # staff-native is an Expo app but lives in the npm workspace, so
        # the root npm ci covers it — no per-app install needed.
        app: [backoffice, staff, order, loyalty, pickup, staff-native]
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-for-production-minimum-32-chars"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key-for-ci-build"
      NEXT_PUBLIC_LOYALTY_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_LOYALTY_SUPABASE_ANON_KEY: "placeholder-loyalty-anon"
      LOYALTY_SUPABASE_SERVICE_ROLE_KEY: "placeholder-loyalty-service-role"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role"
      CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      NEXT_PUBLIC_SENTRY_DSN: ""
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Prisma generate happens via the apps' own postinstall hooks
      # (where present). Run typecheck from the app directory so
      # tsconfig.json paths resolve correctly.
      - run: cd apps/${{ matrix.app }} && npx tsc --noEmit

  # Typecheck the Expo apps still OUTSIDE the npm workspaces (each has
  # its own package-lock.json), so they need their own install step.
  # As apps migrate into the workspace (staff-native done — see
  # docs/architecture-restructure-plan.md Phase 2) they move to the
  # `typecheck` matrix above. The EAS/OTA workflows build these apps
  # with no pre-build validation — this job is the only gate between
  # a TS error and a broken till build.
  typecheck-native:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [pos-native, pickup-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: cd apps/${{ matrix.app }} && npm ci
      - run: cd apps/${{ matrix.app }} && npx tsc --noEmit

  # Schema drift guard. packages/db/prisma/schema.prisma is the
  # source of truth, but the database is changed via manually-applied
  # SQL saved under packages/db/prisma/migrations/ (see
  # docs/database-migrations.md). Fail any PR that edits the schema
  # without committing a matching migration file, so the audit trail
  # can't silently drift.
  migration-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require migration file alongside schema.prisma changes
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          if echo "$CHANGED" | grep -q '^packages/db/prisma/schema\.prisma$'; then
            if ! echo "$CHANGED" | grep -q '^packages/db/prisma/migrations/'; then
              echo "::error::schema.prisma changed but no migration file was added under packages/db/prisma/migrations/."
              echo "See docs/database-migrations.md for the workflow (prisma migrate diff -> save SQL -> commit both)."
              exit 1
            fi
          fi
          echo "Migration guard passed."

  # Lint. BLOCKING for the apps at 0 errors (order, loyalty, staff) so
  # they stay clean; advisory for backoffice until its 98-error backlog
  # (mostly no-explicit-any + unescaped entities) is burned down.
  # pickup is excluded — the Capacitor shell has no eslint deps.
  # Errors block; warnings don't (set-state-in-effect / purity are
  # deliberately warn-level — see the per-app eslint.config.mjs).
  # `next lint` is deprecated in Next 16 so we use eslint directly.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.advisory }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: order,      advisory: false }
          - { app: loyalty,    advisory: false }
          - { app: staff,      advisory: false }
          - { app: backoffice, advisory: true }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd apps/${{ matrix.app }} && npx eslint .

  # Production build for every Next.js app. Catches build-time
  # errors (server actions, route configs, missing env types) that
  # typecheck alone misses. `staff` and `order` were not in this
  # matrix before — easy regressions could land on prod.
  build:
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    strategy:
      fail-fast: false
      matrix:
        app: [backoffice, staff, order, loyalty, pickup]
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-for-production-minimum-32-chars"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key-for-ci-build"
      NEXT_PUBLIC_LOYALTY_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_LOYALTY_SUPABASE_ANON_KEY: "placeholder-loyalty-anon"
      LOYALTY_SUPABASE_SERVICE_ROLE_KEY: "placeholder-loyalty-service-role"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role"
      CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      NEXT_PUBLIC_SENTRY_DSN: ""
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd apps/${{ matrix.app }} && npx next build
